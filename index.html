<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./src/assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Social links profile</title>
  <link rel="stylesheet" href="./src/css/reset.css">
  <link rel="stylesheet" href="./src/css/variables.css">
  <link rel="stylesheet" href="./src/css/style.css">
  <link rel="stylesheet" href="./src/css/responsive.css">
</head>
<body>

  <main>
    <article class="profile-card">
      <img src="./src/assets/images/avatar-jessica.jpeg" alt="User profile picture" class="user-avatar">
      <div class="name-location">
        <h1 class="user-name">Jessica Randall</h1>
        <p class="location">London, United Kingdom</p>
      </div>
      <p class="bio">"Front-end developer and avid reader."</p>

      <nav class="social-links" aria-label="Social media links">
        <a href="#" aria-label="GitHub profile">GitHub</a>
        <a href="#" aria-label="Frontend Mentor profile">Frontend Mentor</a>
        <a href="#" aria-label="LinkedIn profile">LinkedIn</a>
        <a href="#" aria-label="Twitter profile">Twitter</a>
        <a href="#" aria-label="Instagram profile">Instagram</a>
      </nav>

    </article>
  </main>

</body>
</html>
